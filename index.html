<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f8f5" />
    <title>Project Jeju</title>
    <link rel="stylesheet" href="./styles/base.css?v=20260604-qa-weather-ocr" />
    <link rel="stylesheet" href="./styles/layout.css?v=20260604-qa-weather-ocr" />
    <link rel="stylesheet" href="./styles/components.css?v=20260604-qa-weather-ocr" />
    <link rel="stylesheet" href="./styles/views.css?v=20260604-qa-weather-ocr" />
    <link rel="stylesheet" href="./styles/theme-style2.css?v=20260604-qa-weather-ocr" />
    <link rel="stylesheet" href="./styles/theme-style3-guam.css?v=20260604-qa-weather-ocr" />
  </head>
  <body>
    <div id="app" class="app-root"></div>
    <div id="modal-root"></div>
    <input id="image-input" class="visually-hidden" type="file" accept="image/*" capture="environment" />
    <script type="module">
      window.addEventListener("error", (event) => {
        document.querySelector("#app").textContent = `App error: ${event.message}`;
      });
      window.addEventListener("unhandledrejection", (event) => {
        document.querySelector("#app").textContent = `App rejection: ${event.reason?.message || event.reason}`;
      });
    </script>
    <script type="module" src="./src/app.js?v=20260604-qa-weather-ocr"></script>
  </body>
</html>
